<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1251" cy="659" r="28" fill="#047857" opacity="0.12"/>
    <circle cx="518" cy="363" r="82" fill="#047857" opacity="0.18"/>
    <circle cx="200" cy="483" r="36" fill="#047857" opacity="0.09"/>
    <circle cx="690" cy="136" r="22" fill="#047857" opacity="0.08"/>
    <circle cx="326" cy="-46" r="90" fill="#047857" opacity="0.20"/>
    <circle cx="237" cy="-14" r="74" fill="#047857" opacity="0.11"/>
    <rect x="812" y="191" width="26" height="87" rx="8" fill="#059669" opacity="0.04" transform="rotate(10, 186, 488)"/>
    <rect x="121" y="135" width="20" height="82" rx="8" fill="#059669" opacity="0.09" transform="rotate(21, 106, 217)"/>
    <rect x="641" y="-14" width="46" height="52" rx="8" fill="#059669" opacity="0.08" transform="rotate(42, 223, 475)"/>
    <rect x="744" y="585" width="54" height="64" rx="8" fill="#059669" opacity="0.04" transform="rotate(4, 548, 392)"/>
    <rect x="5" y="73" width="82" height="94" rx="8" fill="#059669" opacity="0.15" transform="rotate(7, 199, 259)"/>
    <rect x="274" y="446" width="68" height="47" rx="8" fill="#059669" opacity="0.07" transform="rotate(7, 697, 467)"/>
    <rect x="1036" y="274" width="80" height="28" rx="8" fill="#059669" opacity="0.06" transform="rotate(43, 766, 409)"/>
    <rect x="401" y="563" width="86" height="88" rx="8" fill="#059669" opacity="0.12" transform="rotate(0, 325, 342)"/>
    <polygon points="1294,420 1316,464 1272,464" fill="#047857" opacity="0.07"/>
    <polygon points="874,505 951,659 797,659" fill="#047857" opacity="0.05"/>
    <polygon points="1270,124 1303,190 1237,190" fill="#047857" opacity="0.12"/>
    <polygon points="588,569 667,727 509,727" fill="#047857" opacity="0.10"/>

  <!-- Wave at bottom -->
  <path d="M0,548 C360,589 840,507 1200,548 L1200,630 L0,630Z" fill="#047857" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    상수 유흥 추천정보
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    상수 — 유흥
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#34d399" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#34d399" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    상수 상수 유흥 추천정보 — 유흥
  </text>
</svg>